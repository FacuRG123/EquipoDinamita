<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VapeStore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 150px;
            margin-bottom: 15px;
        }

        .price {
            color: #2575fc;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #6a11cb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2575fc;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>VapeStore</h1>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Productos</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<section class="container">
    <h2 style="text-align:center; margin-bottom:30px;">Nuestros Productos</h2>

    <div class="products">
        
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Vape 1">
            <h3>Vape Ice Blue</h3>
            <p>Sabor fresco y suave.</p>
            <div class="price">BS150</div>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Vape 2">
            <h3>Vape Strawberry</h3>
            <p>Sabor frutal intenso.</p>
            <div class="price">BS100</div>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Vape 3">
            <h3>Vape Mint Pro</h3>
            <p>Diseño moderno y elegante.</p>
            <div class="price">BS220</div>
            <button>Comprar</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 VapeStore - Todos los derechos reservados</p>
</footer>

</body>
</html>
